<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            min-width: 220px;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card {
            background: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
        }

        h3 {
            margin: 0 0 5px 0;
            color: #2b2d42;
            font-weight: 600;
            font-size: 15px;
        }
        
        p {
            margin: 0 0 15px 0;
            color: #8d99ae;
            font-size: 12px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(110, 142, 251, 0.3);
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>104 PTT 工作評論</h3>
        <p>Author: MingJen</p>
        <a class="btn" href="https://medium.com/@surprised128" target="_blank">造訪技術部落格</a>
    </div>
</body>

</html>
